<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=300, height=250, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <style>
    html,
    body {
      margin: 0;
      padding: 0;
      width: 300px;
      height: 250px;
      min-width: 300px;
      min-height: 250px;
      overflow: hidden;
    }

    .ad-click-surface {
      display: block;
      box-sizing: border-box;
      width: 300px;
      height: 250px;
      min-width: 300px;
      min-height: 250px;
      cursor: pointer;
    }

    .ad-click-surface a {
      display: block;
      box-sizing: border-box;
      width: 300px;
      height: 250px;
      min-width: 300px;
      min-height: 250px;
      cursor: pointer;
      opacity: 1;
      visibility: visible;
      text-decoration: none;
    }

    .ad-click-fill {
      display: block;
      width: 300px;
      height: 250px;
      min-width: 300px;
      min-height: 250px;
      pointer-events: none;
    }
  </style>
</head>
<body>
  <div class="ad-click-surface" role="link" jsaction="click">
    <a
      href="https://fingerfungame.com?pd=hidden"
      role="link"
      target="_self"
      rel="noopener noreferrer"
      style="display:block;box-sizing:border-box;width:300px;height:250px;min-width:300px;min-height:250px;cursor:pointer"
    ><img
      class="ad-click-fill"
      src="data:image/gif;base64,R0lGODlhAQABAIAAAAAAAP///yH5BAEAAAAALAAAAAABAAEAAAIBRAA7"
      width="300"
      height="250"
      alt=""
    /></a>
  </div>
  <script>
    (function () {
      if (!window || window.top === window) return;
      if (window.__cweb_cover_probe_installed) return;
      window.__cweb_cover_probe_installed = true;

      var initialURL = String(location.href || '');
      var AD_W = 300;
      var AD_H = 250;

      function frameSize() {
        var w = Math.round(
          window.innerWidth ||
            (document.documentElement && document.documentElement.clientWidth) ||
            AD_W
        );
        var h = Math.round(
          window.innerHeight ||
            (document.documentElement && document.documentElement.clientHeight) ||
            AD_H
        );
        if (w < 4) w = AD_W;
        if (h < 4) h = AD_H;
        return { w: w, h: h };
      }

      function collectItems() {
        var out = [];
        var nodes = document.querySelectorAll(
          'a,[onclick],[role="button"],[role="link"],[jsaction]'
        );
        for (var i = 0; i < nodes.length; i++) {
          var el = nodes[i];
          if (!el || String(el.tagName || '').toUpperCase() === 'SPAN') continue;
          var r;
          try {
            r = el.getBoundingClientRect();
          } catch (_) {
            r = null;
          }
          if (!r || r.width < 4 || r.height < 4) continue;
          out.push({
            left: Number(r.left),
            top: Number(r.top),
            width: Number(r.width),
            height: Number(r.height),
            tag: String(el.tagName || '').toLowerCase(),
            href: String((el.getAttribute && el.getAttribute('href')) || el.href || ''),
            role: String((el.getAttribute && el.getAttribute('role')) || ''),
          });
        }
        if (out.length === 0) {
          out.push({
            left: 0,
            top: 0,
            width: AD_W,
            height: AD_H,
            tag: 'a',
            href: 'https://fingerfungame.com?pd=hidden',
            role: 'link',
          });
        }
        out.sort(function (a, b) {
          return b.width * b.height - a.width * a.height;
        });
        return out.slice(0, 10);
      }

      function post(items, reason) {
        try {
          var handler =
            window.webkit &&
            window.webkit.messageHandlers &&
            window.webkit.messageHandlers.cweb_impression;
          if (!handler || !handler.postMessage) return;
          var sz = frameSize();
          handler.postMessage({
            event: 'ad_iframe_click_targets',
            pageURL: '',
            ts: Date.now() / 1000,
            data: {
              frameURL: String(location.href || ''),
              frameInitialURL: initialURL,
              frameWidth: sz.w,
              frameHeight: sz.h,
              items: items || [],
              reason: String(reason || 'cover_inline'),
            },
          });
        } catch (_) {}
      }

      var state = { lastSig: '', timers: [] };
      function clearTimers() {
        for (var i = 0; i < state.timers.length; i++) {
          try {
            clearTimeout(state.timers[i]);
          } catch (_) {}
        }
        state.timers = [];
      }

      function tick(reason) {
        var items = collectItems();
        if (!items.length) return;
        var sig = items
          .map(function (x) {
            return [
              Math.round(x.left),
              Math.round(x.top),
              Math.round(x.width),
              Math.round(x.height),
            ].join(',');
          })
          .join('|');
        if (sig === state.lastSig) return;
        state.lastSig = sig;
        post(items, reason);
      }

      function start(reason) {
        clearTimers();
        state.lastSig = '';
        tick(reason + '_t0');
        var delays = [
          200, 600, 1200, 1800, 2500, 3500, 4500, 6000, 7500, 9000, 11000, 13000, 15000, 17000, 19500,
        ];
        for (var i = 0; i < delays.length; i++) {
          (function (d) {
            state.timers.push(
              setTimeout(function () {
                tick(reason + '_t' + d);
              }, d)
            );
          })(delays[i]);
        }
      }

      window.addEventListener(
        'message',
        function (ev) {
          try {
            var d = ev && ev.data;
            if (d === 'cweb_probe_now' || (d && typeof d === 'object' && d.type === 'cweb_probe_now')) {
              start('manual');
            }
          } catch (_) {}
        },
        false
      );

      if (document.readyState === 'complete' || document.readyState === 'interactive') {
        start('auto');
      } else {
        document.addEventListener('DOMContentLoaded', function () {
          start('auto');
        });
        window.addEventListener('load', function () {
          start('auto');
        });
      }
    })();
  </script>
</body>
</html>
