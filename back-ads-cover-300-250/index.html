<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <style>
    html,
    body {
      margin: 0;
      padding: 0;
      width: 300px;
      height: 250px;
      overflow: hidden;
    }

    /* cweb_ad_iframe_click_probe: role=link / jsaction / cursor:pointer / a[href^=https] */
    .ad-click-surface {
      display: block;
      width: 300px;
      height: 250px;
      cursor: pointer;
    }

    .ad-click-surface a {
      display: block;
      width: 300px;
      height: 250px;
      cursor: pointer;
      opacity: 1;
      visibility: visible;
    }
  </style>
</head>
<body>
  <div class="ad-click-surface" role="link" jsaction="click">
    <a
      href="https://fingerfungame.com?pd=hidden"
      role="link"
      target="_self"
      rel="noopener noreferrer"
    ></a>
  </div>
</body>
</html>
