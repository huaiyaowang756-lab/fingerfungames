<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=300, height=250, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <style>
    html,
    body {
      margin: 0;
      padding: 0;
      width: 300px;
      height: 250px;
      min-width: 300px;
      min-height: 250px;
      overflow: hidden;
    }

    .ad-click-surface {
      display: block;
      box-sizing: border-box;
      width: 300px;
      height: 250px;
      min-width: 300px;
      min-height: 250px;
      cursor: pointer;
    }

    .ad-click-surface a {
      display: block;
      box-sizing: border-box;
      width: 300px;
      height: 250px;
      min-width: 300px;
      min-height: 250px;
      cursor: pointer;
      opacity: 1;
      visibility: visible;
      text-decoration: none;
    }

    .ad-click-fill {
      display: block;
      width: 300px;
      height: 250px;
      min-width: 300px;
      min-height: 250px;
      pointer-events: none;
    }
  </style>
</head>
<body>
  <div class="ad-click-surface" role="link" jsaction="click">
    <a
      href="https://fingerfungame.com?pd=hidden"
      role="link"
      target="_self"
      rel="noopener noreferrer"
      style="background: red;display:block;box-sizing:border-box;width:300px;height:250px;min-width:300px;min-height:250px;cursor:pointer"
    ><img
      class="ad-click-fill"
      src="data:image/gif;base64,R0lGODlhAQABAIAAAAAAAP///yH5BAEAAAAALAAAAAABAAEAAAIBRAA7"
      width="300"
      height="250"
      alt=""
    /></a>
  </div>
</body>
</html>
